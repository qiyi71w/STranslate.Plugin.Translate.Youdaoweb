name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\STranslate.Plugin.Translate.YoudaoWeb.csproj

      - name: Build
        run: dotnet build .\STranslate.Plugin.Translate.YoudaoWeb.csproj --configuration Release --no-restore
